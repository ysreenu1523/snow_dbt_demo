name: Run dbt on Snowflake

on:
  push:
    branches:
      - main  # Triggers the pipeline when pushing to the main branch
  pull_request:
    branches:
      - main

jobs:
  run_dbt:
    runs-on: ubuntu-latest

    env:
      # Map GitHub Secrets to Environment Variables for dbt profiles.yml
      DBT_SNOWFLAKE_ACCOUNT: ${{ secrets.DBT_SNOWFLAKE_ACCOUNT }}
      DBT_SNOWFLAKE_USER: ${{ secrets.DBT_SNOWFLAKE_USER }}
      DBT_SNOWFLAKE_PASSWORD: ${{ secrets.DBT_SNOWFLAKE_PASSWORD }}
      DBT_SNOWFLAKE_ROLE: ${{ secrets.DBT_SNOWFLAKE_ROLE }}
      DBT_SNOWFLAKE_WAREHOUSE: ${{ secrets.DBT_SNOWFLAKE_WAREHOUSE }}
      DBT_SNOWFLAKE_DATABASE: ${{ secrets.DBT_SNOWFLAKE_DATABASE }}
      DBT_SNOWFLAKE_SCHEMA: ${{ secrets.DBT_SNOWFLAKE_SCHEMA }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install dbt-snowflake

      - name: Install dbt Packages
        run: dbt deps --project-dir ./snow_dbt_demo --profiles-dir ./snow_dbt_demo .

      - name: Test Snowflake Connection
        run: dbt debug --project-dir ./snow_dbt_demo --profiles-dir ./snow_dbt_demo .

      - name: Run dbt Models
        run: dbt run --project-dir ./snow_dbt_demo --profiles-dir ./snow_dbt_demo .

      - name: Run dbt Seed
        run: dbt seed --project-dir ./snow_dbt_demo --profiles-dir ./snow_dbt_demo .

      - name: Test dbt Models
        run: dbt test --project-dir ./snow_dbt_demo --profiles-dir ./snow_dbt_demo .
